<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>For Jenisha ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Raleway:ital,wght@0,200;0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#02000a;overflow:hidden;font-family:'Raleway',sans-serif;cursor:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#bg{z-index:1}
#fx{z-index:6}
.cur{position:fixed;z-index:999;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,rgba(255,180,80,.9),transparent 70%);pointer-events:none;transform:translate(-50%,-50%);transition:transform .08s;mix-blend-mode:screen}

/* ── Collectible stars ── */
.cstar{
  position:fixed;z-index:10;
  font-size:var(--sz,1.5rem);
  opacity:var(--op,0.7);
  color:var(--col,#ffd700);
  text-shadow:0 0 12px var(--col,#ffd700),0 0 28px var(--col,#ffd700);
  cursor:pointer;
  user-select:none;
  transition:transform .15s,opacity .15s,filter .15s;
  animation:twinkle var(--tw,3.5s) ease-in-out infinite;
  transform:translate(-50%,-50%);
}
.cstar:hover{transform:translate(-50%,-50%) scale(1.6)!important;opacity:1!important;filter:brightness(1.8)}
.cstar.gone{display:none}
@keyframes twinkle{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) drop-shadow(0 0 6px var(--col))}}

/* ── Center hub ── */
.hub{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:130px;height:130px;
  z-index:15;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
  transition:opacity .8s ease;
}
.prog-svg{position:absolute;width:130px;height:130px;overflow:visible}
.lock{font-size:2.4rem;z-index:2;animation:lockPulse 2.2s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,107,157,.5))}
.counter{font-size:.65rem;font-weight:300;letter-spacing:.25em;color:rgba(255,150,180,.6);z-index:2}
@keyframes lockPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes lockShake{
  0%,100%{transform:scale(1) rotate(0deg)}
  15%{transform:scale(1.1) rotate(-8deg)}
  30%{transform:scale(1.1) rotate(8deg)}
  45%{transform:scale(1.1) rotate(-5deg)}
  60%{transform:scale(1.1) rotate(5deg)}
  75%{transform:scale(1.2) rotate(0deg)}
}
.hub.shaking .lock{animation:lockShake .5s ease forwards}

/* ── Hint ── */
.hint{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:.72rem;font-weight:300;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(255,200,100,.45);z-index:10;
  text-align:center;white-space:nowrap;
  animation:hintFade 4s ease-in-out infinite;
  transition:opacity 1s;
}
@keyframes hintFade{0%,100%{opacity:.3}50%{opacity:.7}}

/* ── Message card ── */
.card-wrap{
  position:fixed;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
  perspective:1200px;
}
.card-wrap.visible{opacity:1;pointer-events:all}
.card{
  background:linear-gradient(145deg,#110022,#0a0018 60%,#180030);
  border:1px solid rgba(255,107,157,.25);
  border-radius:22px;
  padding:clamp(28px,6vw,52px) clamp(24px,7vw,60px);
  max-width:min(500px,92vw);
  width:100%;
  box-shadow:
    0 0 40px rgba(196,77,255,.12),
    0 0 80px rgba(255,107,157,.06),
    inset 0 1px 0 rgba(255,255,255,.06);
  transform:rotateX(0deg) rotateY(0deg) translateY(40px);
  transition:transform .12s ease, box-shadow .12s ease;
  transform-style:preserve-3d;
  text-align:center;
  position:relative;
  overflow:hidden;
  animation:cardRise 1s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes cardRise{from{transform:translateY(60px) scale(.92);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.card::before{
  content:'';position:absolute;top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(ellipse at 60% 40%,rgba(255,107,157,.06) 0%,transparent 60%);
  pointer-events:none;
}
.card-stars{font-size:1.1rem;letter-spacing:.2em;opacity:.6;margin-bottom:14px}
.card-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2.6rem,9vw,4.5rem);
  font-weight:700;
  background:linear-gradient(135deg,#ff9de2,#ff6b9d,#c44dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:6px;
}
.card-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,157,.5),transparent);margin:0 auto 22px}
.card-msg{
  font-size:clamp(.85rem,2.3vw,1.06rem);font-weight:300;
  line-height:2;color:rgba(255,220,240,.8);
  font-style:italic;min-height:80px;
}
.card-msg em{font-style:normal;color:#ff9de2}
.card-btn{
  margin-top:28px;
  background:transparent;
  border:1px solid rgba(255,107,157,.4);
  color:rgba(255,200,220,.85);
  font-family:'Raleway',sans-serif;
  font-size:clamp(.72rem,2vw,.85rem);
  font-weight:400;letter-spacing:.22em;text-transform:uppercase;
  padding:11px 34px;border-radius:50px;cursor:pointer;
  transition:all .3s;backdrop-filter:blur(8px);
  display:block;margin-left:auto;margin-right:auto;
}
.card-btn:hover{border-color:#ff6b9d;box-shadow:0 0 20px rgba(255,107,157,.4);transform:translateY(-2px)}
.card-btn.sent{color:#ff9de2;border-color:rgba(255,107,157,.7)}
.datestamp{
  position:fixed;bottom:14px;right:18px;
  font-size:.65rem;letter-spacing:.18em;color:rgba(255,200,100,.2);
  z-index:20;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>
<div class="cur" id="cur"></div>

<!-- 7 stars to find — varying opacity/size for difficulty -->
<div class="cstar" id="cs0" style="left:13%;top:17%;--sz:2rem;--op:0.92;--col:#ffd700;--tw:2.8s" onclick="collect(0)">✦</div>
<div class="cstar" id="cs1" style="left:79%;top:13%;--sz:1.3rem;--op:0.68;--col:#ffe0a0;--tw:3.5s" onclick="collect(1)">✦</div>
<div class="cstar" id="cs2" style="left:91%;top:46%;--sz:2.2rem;--op:0.88;--col:#ffb6c1;--tw:2.3s" onclick="collect(2)">✦</div>
<div class="cstar" id="cs3" style="left:83%;top:79%;--sz:1.5rem;--op:0.6;--col:#c8e6ff;--tw:4.1s" onclick="collect(3)">✦</div>
<div class="cstar" id="cs4" style="left:19%;top:84%;--sz:1.1rem;--op:0.38;--col:#ffd700;--tw:5s" onclick="collect(4)">✦</div>
<div class="cstar" id="cs5" style="left:4%;top:54%;--sz:0.95rem;--op:0.22;--col:#fff0c0;--tw:6s" onclick="collect(5)">✦</div>
<div class="cstar" id="cs6" style="left:49%;top:7%;--sz:1.6rem;--op:0.75;--col:#ffb6c1;--tw:3.1s" onclick="collect(6)">✦</div>

<!-- Center hub -->
<div class="hub" id="hub">
  <svg class="prog-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#c44dff"/>
      </linearGradient>
      <filter id="gf"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <circle cx="50" cy="50" r="44" stroke="rgba(255,255,255,.07)" stroke-width="1.5" fill="none"/>
    <circle id="parc" cx="50" cy="50" r="44" stroke="url(#pg)" stroke-width="2.2"
            fill="none" stroke-dasharray="276.46" stroke-dashoffset="276.46"
            stroke-linecap="round" transform="rotate(-90 50 50)"
            style="transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)"/>
    <g id="sdots"></g>
  </svg>
  <div class="lock" id="lockIcon">🔒</div>
  <div class="counter" id="counter">0 · 7</div>
</div>

<div class="hint" id="hint">✦ &nbsp; seven stars are hidden in this sky &nbsp; ✦</div>

<!-- Message card (hidden until unlock) -->
<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <div class="card-stars">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="card-name">Jenisha</div>
    <div class="card-line"></div>
    <p class="card-msg" id="cardMsg"></p>
    <button class="card-btn" id="cardBtn" onclick="sendLoveBack(this)">💗 &nbsp; Send Love Back</button>
  </div>
</div>

<div class="datestamp">April 20 · 2026</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let collected = 0;
const TOTAL = 7;
let unlocked = false;

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
const fxC = document.getElementById('fx');
const fxX = fxC.getContext('2d');
let W = bgC.width = fxC.width = window.innerWidth;
let H = bgC.height = fxC.height = window.innerHeight;

// ─── BACKGROUND STARFIELD ────────────────────────────────────────────────────
const BGSTARS = Array.from({length:320}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.6+.15,
  base: Math.random()*.55+.2,
  op: 0,
  ts: Math.random()*.016+.004,
  tp: Math.random()*Math.PI*2,
  col: ['255,255,255','255,200,220','200,185,255','180,220,255'][Math.floor(Math.random()*4)],
  vx:(Math.random()-.5)*.04, vy:(Math.random()-.5)*.04,
}));

function drawNebula() {
  const n1 = bgX.createRadialGradient(W*.15,H*.25,0,W*.15,H*.25,W*.45);
  n1.addColorStop(0,'rgba(255,80,150,.03)'); n1.addColorStop(1,'rgba(0,0,0,0)');
  bgX.fillStyle=n1; bgX.fillRect(0,0,W,H);
  const n2 = bgX.createRadialGradient(W*.85,H*.7,0,W*.85,H*.7,W*.4);
  n2.addColorStop(0,'rgba(80,60,255,.035)'); n2.addColorStop(1,'rgba(0,0,0,0)');
  bgX.fillStyle=n2; bgX.fillRect(0,0,W,H);
}

function loopBg() {
  bgX.clearRect(0,0,W,H);
  drawNebula();
  BGSTARS.forEach(s => {
    s.tp += s.ts;
    s.op = Math.max(.05, Math.min(1, s.base + Math.sin(s.tp)*.22));
    s.x += s.vx; s.y += s.vy;
    if(s.x<0)s.x=W; if(s.x>W)s.x=0; if(s.y<0)s.y=H; if(s.y>H)s.y=0;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(${s.col},${s.op})`; bgX.fill();
    if(s.r>1.2){
      const g=bgX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
      g.addColorStop(0,`rgba(${s.col},${s.op*.3})`); g.addColorStop(1,'rgba(0,0,0,0)');
      bgX.beginPath(); bgX.arc(s.x,s.y,s.r*4,0,Math.PI*2);
      bgX.fillStyle=g; bgX.fill();
    }
  });
  requestAnimationFrame(loopBg);
}
requestAnimationFrame(loopBg);

// ─── PROGRESS RING DOTS ───────────────────────────────────────────────────────
const dotsG = document.getElementById('sdots');
const circumference = 2 * Math.PI * 44;
for(let i=0;i<TOTAL;i++){
  const angle = (i/TOTAL)*2*Math.PI - Math.PI/2;
  const x = 50 + 44*Math.cos(angle);
  const y = 50 + 44*Math.sin(angle);
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r','3.5');
  c.setAttribute('fill','rgba(255,255,255,.12)'); c.setAttribute('id',`dot${i}`);
  c.style.transition='fill .4s, filter .4s';
  dotsG.appendChild(c);
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
const particles = [];
class Particle {
  constructor(x,y,col,burst) {
    this.x=x; this.y=y;
    this.col=col||'255,107,157';
    const angle=Math.random()*Math.PI*2;
    const spd=burst?(Math.random()*9+4):(Math.random()*4+1.5);
    this.vx=Math.cos(angle)*spd; this.vy=Math.sin(angle)*spd-(burst?2:0);
    this.grav=burst?.18:.06;
    this.r=Math.random()*(burst?3:2)+.8;
    this.life=1; this.decay=burst?(.018+Math.random()*.02):(.008+Math.random()*.01);
    this.rot=Math.random()*Math.PI*2; this.rs=(Math.random()-.5)*.1;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.vx*=.98;this.rot+=this.rs;this.life-=this.decay;}
  draw(){
    fxX.save(); fxX.globalAlpha=Math.max(0,this.life);
    fxX.beginPath(); fxX.arc(this.x,this.y,this.r,0,Math.PI*2);
    fxX.fillStyle=`rgba(${this.col},1)`; fxX.fill();
    fxX.restore();
  }
}

const BURST_EMOJIS = ['✦','💗','✨','★','♡'];
class EmojiParticle {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.em=BURST_EMOJIS[Math.floor(Math.random()*BURST_EMOJIS.length)];
    const angle=Math.random()*Math.PI*2;
    const spd=Math.random()*6+3;
    this.vx=Math.cos(angle)*spd; this.vy=Math.sin(angle)*spd-3;
    this.grav=.2; this.sz=Math.random()*18+10;
    this.life=1; this.decay=.02+Math.random()*.015;
    this.rot=Math.random()*Math.PI*2; this.rs=(Math.random()-.5)*.15;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.vx*=.97;this.rot+=this.rs;this.life-=this.decay;}
  draw(){
    fxX.save(); fxX.globalAlpha=Math.max(0,this.life);
    fxX.translate(this.x,this.y); fxX.rotate(this.rot);
    fxX.font=`${this.sz}px Arial`; fxX.textAlign='center'; fxX.textBaseline='middle';
    fxX.fillText(this.em,0,0); fxX.restore();
  }
}

function createBurst(x,y,col,count=14) {
  const c=col||'255,107,157';
  for(let i=0;i<count;i++) particles.push(new Particle(x,y,c,true));
  for(let i=0;i<Math.floor(count/2);i++) particles.push(new EmojiParticle(x,y));
}

function loopFx() {
  fxX.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--) {
    particles[i].update(); particles[i].draw();
    if(particles[i].life<=0) particles.splice(i,1);
  }
  requestAnimationFrame(loopFx);
}
requestAnimationFrame(loopFx);

// ─── COLLECT MECHANIC ─────────────────────────────────────────────────────────
const colColors = ['255,215,0','255,224,160','255,182,193','200,230,255','255,215,0','255,240,192','255,182,193'];

function collect(i) {
  if(unlocked) return;
  const star = document.getElementById(`cs${i}`);
  if(!star || star.classList.contains('gone')) return;

  const rect = star.getBoundingClientRect();
  const sx = rect.left + rect.width/2;
  const sy = rect.top  + rect.height/2;

  // Burst at star position
  createBurst(sx, sy, colColors[i], 16);

  // Scale-pop then fly to center
  star.style.transition='transform .15s,opacity .15s';
  star.style.transform='translate(-50%,-50%) scale(2.2)';
  setTimeout(()=>{
    flyToHub(star, sx, sy, colColors[i]);
    star.classList.add('gone');
  }, 150);

  collected++;
  setTimeout(()=>updateProgress(i), 700);
}

function flyToHub(star, fromX, fromY, col) {
  const hub = document.getElementById('hub');
  const hr = hub.getBoundingClientRect();
  const toX = hr.left + hr.width/2;
  const toY = hr.top  + hr.height/2;

  const clone = document.createElement('div');
  clone.style.cssText=`position:fixed;left:${fromX}px;top:${fromY}px;
    transform:translate(-50%,-50%) scale(1.5);font-size:1.6rem;
    color:#ffd700;text-shadow:0 0 12px #ffd700;
    z-index:50;pointer-events:none;
    transition:left .65s cubic-bezier(.4,0,.2,1),
               top  .65s cubic-bezier(.4,0,.2,1),
               transform .65s, opacity .5s;`;
  clone.textContent='✦';
  document.body.appendChild(clone);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    clone.style.left=toX+'px'; clone.style.top=toY+'px';
    clone.style.transform='translate(-50%,-50%) scale(0)';
    clone.style.opacity='0';
  }));
  setTimeout(()=>clone.remove(), 700);
}

function updateProgress(starIdx) {
  const parc = document.getElementById('parc');
  parc.style.strokeDashoffset = circumference - (collected/TOTAL)*circumference;

  document.getElementById('counter').textContent=`${collected} · 7`;

  // Light up slot dot
  const dot=document.getElementById(`dot${collected-1}`);
  if(dot){dot.setAttribute('fill','#ff6b9d');dot.style.filter='drop-shadow(0 0 3px #ff6b9d)'}

  // Hub mini-flash
  const hub=document.getElementById('hub');
  hub.style.filter='drop-shadow(0 0 15px rgba(255,107,157,.9))';
  setTimeout(()=>hub.style.filter='',300);

  // Mini burst at center
  const hr=hub.getBoundingClientRect();
  createBurst(hr.left+hr.width/2, hr.top+hr.height/2, colColors[starIdx]||'255,107,157', 8);

  if(collected===TOTAL) setTimeout(unlock, 400);
}

// ─── UNLOCK SEQUENCE ─────────────────────────────────────────────────────────
function unlock() {
  unlocked=true;
  const hub  = document.getElementById('hub');
  const lock = document.getElementById('lockIcon');
  const hint = document.getElementById('hint');
  const hr   = hub.getBoundingClientRect();
  const cx   = hr.left+hr.width/2, cy=hr.top+hr.height/2;

  // Phase 1: shake
  hub.classList.add('shaking');
  setTimeout(()=>{
    hub.classList.remove('shaking');

    // Phase 2: EXPLODE
    for(let i=0;i<6;i++) setTimeout(()=>createBurst(cx,cy,'255,107,157',20),i*80);
    for(let i=0;i<4;i++) setTimeout(()=>createBurst(cx,cy,'196,77,255',15),i*100+40);

    // Phase 3: Transform lock to heart
    lock.style.animation='none';
    lock.style.transform='scale(2)';
    lock.textContent='💗';
    lock.style.filter='drop-shadow(0 0 25px rgba(255,107,157,.9))';

    // Phase 4: Fade hub + hint
    setTimeout(()=>{
      hub.style.opacity='0'; hub.style.pointerEvents='none';
      hint.style.opacity='0';
    }, 700);

    // Phase 5: Show card
    setTimeout(showCard, 1400);
  }, 520);
}

// ─── MESSAGE CARD ─────────────────────────────────────────────────────────────
const MSG = `You found all seven.\n\nSomehow that doesn't surprise me.\nYou've always known how to find\nbeautiful things in the darkest skies.\n\nI put your name up there a while ago —\nin the stars, where things that matter belong.\n\nThis was just a small way of saying\nI think about you\nmore than the stars can count.\n\n— always. 💗`;

function showCard() {
  const wrap = document.getElementById('cardWrap');
  wrap.classList.add('visible');

  // Typewriter message
  const el = document.getElementById('cardMsg');
  let i=0;
  const t = setInterval(()=>{
    if(i<MSG.length){
      el.innerHTML = MSG.slice(0,i+1).replace(/\n/g,'<br>');
      i++;
    } else { clearInterval(t); }
  }, 28);

  // Ambient particles after reveal
  setTimeout(()=>{
    setInterval(()=>{
      if(!document.hidden)
        particles.push(new EmojiParticle(Math.random()*W, H+20));
    }, 2800);
  }, 3000);
}

// ─── 3D CARD TILT ────────────────────────────────────────────────────────────
let tiltX=0, tiltY=0;
document.addEventListener('mousemove', e => {
  const card=document.getElementById('card');
  const rect=card.getBoundingClientRect();
  if(!rect.width) return;
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const tx=(e.clientX-cx)/(rect.width/2)*12;
  const ty=(e.clientY-cy)/(rect.height/2)*(-10);
  tiltX+=(tx-tiltX)*.12; tiltY+=(ty-tiltY)*.12;
  card.style.transform=`perspective(900px) rotateY(${tiltX}deg) rotateX(${tiltY}deg)`;
  card.style.boxShadow=`${-tiltX*1.5}px ${tiltY*1.5}px 60px rgba(196,77,255,.18), 0 0 80px rgba(255,107,157,.08), inset 0 1px 0 rgba(255,255,255,.07)`;
});
document.addEventListener('mouseleave',()=>{
  const card=document.getElementById('card');
  card.style.transform='perspective(900px) rotateY(0deg) rotateX(0deg)';
  card.style.boxShadow='';
});

// Touch tilt
document.addEventListener('touchmove', e => {
  const card=document.getElementById('card');
  const rect=card.getBoundingClientRect();
  if(!rect.width) return;
  const t=e.touches[0];
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const tx=(t.clientX-cx)/(rect.width/2)*8;
  const ty=(t.clientY-cy)/(rect.height/2)*(-6);
  card.style.transform=`perspective(900px) rotateY(${tx}deg) rotateX(${ty}deg)`;
},{passive:true});

// ─── SEND LOVE BACK ───────────────────────────────────────────────────────────
function sendLoveBack(btn) {
  btn.textContent='💗 Love Sent Back 💗'; btn.classList.add('sent');
  for(let i=0;i<5;i++) setTimeout(()=>{
    createBurst(Math.random()*W*.6+W*.2, Math.random()*H*.6+H*.2,'255,107,157',20);
  },i*160);
  setTimeout(()=>{btn.textContent='💗 Send Love Back'; btn.classList.remove('sent');},3500);
}

// ─── CURSOR ──────────────────────────────────────────────────────────────────
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
});

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=bgC.width=fxC.width=window.innerWidth;
  H=bgC.height=fxC.height=window.innerHeight;
});
</script>
